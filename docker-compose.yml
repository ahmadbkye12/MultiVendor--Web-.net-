# Optional compose stack — same SQL Server image/password as a typical local `docker run`.
# If you already run a container on port 1433 (e.g. --name sqlserver), stop it first or change the port mapping.
#
# Azure SQL: set ConnectionStrings__DefaultConnection or user secrets; see WebApi appsettings / README patterns.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: multivendor-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-MyPassword123!}"
    ports:
      - "1433:1433"
